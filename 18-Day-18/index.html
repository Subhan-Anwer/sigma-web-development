<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Learning CSS Box Model</h1>
    <div class="box1">This is a div</div>

    <!-- Box Model -->
    <div class="box-model">
        <p>margin</p>
        <div class="border">
            <p>border</p>
            <div class="padding">
                <p>padding</p>
                <div class="content">
                    <p>content</p>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
