<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure HTML Media Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pure HTML Media Player</h1>

    <h3>Audios</h3>
    <ul>
        <li>
            <audio src="audios/audio-1.mp3" autoplay controls loop>Your Browser does not support audio element.</audio>
        </li>
        <li>
            <audio src="audios/audio-2.mp3" controls loop>Your Browser does not support audio element.</audio>
        </li>
        <li>
            <audio src="audios/audio-3.mp3" controls loop>Your Browser does not support audio element.</audio>
        </li>
        <li>
            <audio src="audios/audio-4.mp3" controls loop>Your Browser does not support audio element.</audio>
        </li>
        <li>
            <audio src="audios/audio-5.mp3" controls loop>Your Browser does not support audio element.</audio>
        </li>
        <li>
            <audio src="audios/audio-6.mp3" controls loop>Your Browser does not support audio element.</audio>
        </li>
    </ul>

    <!-- ---------- -->

    <h3>Videos</h3>
    <ul>
        <li>
            <video height="350" src="videos/video-1.mp4" preload="auto" muted autoplay controls>Your Browser does not support video element.</video>
        </li>
        <li>
            <video height="350" src="videos/video-2.mp4" controls>Your Browser does not support video element.</video>
        </li>
        <li>
            <video height="350" src="videos/video-3.mp4" controls>Your Browser does not support video element.</video>
        </li>
        <li>
            <video height="350" src="videos/video-4.mp4" controls>Your Browser does not support video element.</video>
        </li>
        <li>
            <video height="350" src="videos/video-5.mp4" controls>Your Browser does not support video element.</video>
        </li>
        <li>
            <video height="350" src="videos/video-6.mp4" controls>Your Browser does not support video element.</video>
        </li>
    </ul>
</body>
</html>
