<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity & Cascade</title>

    <style>
        .red {
            color: tomato;
        }
        .blue {
            color: lightblue;
        }
        .yellow {
            color: goldenrod;
        }

        h1 {
            color: black;
        }
    </style>
</head>
<body>
    <h1 class="red yellow blue">CSS Specificity & Cascade</h1>
</body>
</html>
