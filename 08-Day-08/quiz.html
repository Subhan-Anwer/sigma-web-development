<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Quiz</title>
</head>

<body>
    <!-- Quick Quiz:
    Without using br tag, write vertically aligned form asking for name, city and pincode of a user. -->

    <form>
        <p><label for="name">Enter Your Name</label></p>
        <p><input type="text" name="name" id="name" placeholder="Name"></p>

        <p><label for="city">Enter Your City</label></p>
        <p><input type="text" name="city" id="city" placeholder="City"></p>

        <p><label for="pincode">Enter Your Pincode</label></p>
        <p><input type="number" name="pincode" id="pincode" placeholder="Pincode"></p>
    </form>

</body>

</html>
